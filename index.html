<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRABAJO EN EQUIPO | Nannys y Peques</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#f5f7fa">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo-sin-fondo.png">
    <link rel="apple-touch-icon" href="logo-sin-fondo.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
    <link rel="stylesheet" href="css/index.css">

    <!-- Content Security Policy (Blindaje contra scripts maliciosos) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.google.com https://cdn.jsdelivr.net https://npmcdn.com https://unpkg.com blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://npmcdn.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.gstatic.com https://*.googleapis.com https://*.firebasestorage.app; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://firebase.google.com https://www.gstatic.com; frame-src 'self' https://www.google.com;">
</head>

<body>
    <div id="app">
        <!-- Main Application Container -->
        <header id="main-header" class="glass-effect hidden">
            <div class="logo">TRABAJO EN <span>EQUIPO</span> <span class="brand-subtitle">Nannys y Peques</span></div>
            <nav id="main-nav">
                <a href="#dashboard" id="nav-dashboard" class="nav-link">Dashboard</a>
                <a href="#plans" id="nav-plans" class="nav-link">Mis planes</a>
                <a href="#tasks" id="nav-tasks" class="nav-link">Mis tareas</a>
                <a href="#cronograma" id="nav-cronograma" class="nav-link">Mi Cronograma</a>
                <a href="#vacaciones" id="nav-vacaciones" class="nav-link">Vacaciones</a>
                <a href="#members" id="nav-members" class="nav-link admin-only hidden">Gestión Equipo</a>
            </nav>
            <div id="user-controls" class="controls hidden">
                <button id="notif-bell" class="notif-btn" title="Notificaciones">
                    <span class="bell-icon">🔔</span>
                    <span id="notif-badge" class="badge-count hidden">0</span>
                </button>
                <button id="logout-btn" class="secondary-btn sm">Salir</button>
                <button id="menu-toggle" class="hamburger-btn">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            <span id="user-name-display" class="user-pill header-user-name hidden">Cargando...</span>
        </header>

        <main id="view-container">
            <!-- Dynamic Content Loaded Here -->
            <div class="loader-container">
                <div class="spinner"></div>
            </div>
        </main>

        <nav id="side-menu" class="side-drawer glass-effect">
            <div class="side-menu-header">
                <div class="logo">MENU</div>
                <button id="close-menu" class="close-btn">&times;</button>
            </div>
            <nav id="mobile-nav-links">
                <!-- Links will be cloned or managed via app.js or CSS -->
                <a href="#dashboard" class="side-link">🏠 Dashboard</a>
                <a href="#plans" class="side-link">📋 Mis planes</a>
                <a href="#tasks" class="side-link">✅ Mis tareas</a>
                <a href="#cronograma" class="side-link">📅 Mi Cronograma</a>
                <a href="#vacaciones" class="side-link">🏖️ Vacaciones</a>
                <a href="#notifications" class="side-link">🔔 Notificaciones</a>
                <a href="#members" id="side-nav-members" class="side-link admin-only hidden">👥 Gestión Equipo</a>
                <hr class="menu-divider">
                <button id="logout-btn-mobile" class="side-link logout-link">🚪 Cerrar Sesión</button>
            </nav>
        </nav>

        <div id="offline-overlay" class="hidden">
            <div class="offline-content glass-effect">
                <div class="offline-icon">📡❌</div>
                <h2>Sin Conexión</h2>
                <p>Por favor, revisa tu internet para continuar.</p>
                <button onclick="window.location.reload()" class="primary-btn">Reintentar</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-check-compat.js"></script>
    
    <!-- Flatpickr for Date Selection -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

    <!-- App Config & Utilities -->
    <script src="js/config.js"></script>

    <script>
        // Inicializar Firebase (Versión Compat) usando la config encapsulada
        firebase.initializeApp(window.firebaseConfig);

        // Inicializar App Check con detección de entorno
        const appCheck = firebase.appCheck();
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        if (isLocal) {
            self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
            console.log("🛠️ App Check en modo DEBUG (Local).");
        }

        appCheck.activate(
            new firebase.appCheck.ReCaptchaV3Provider(window.APP_CONFIG.reCaptchaSiteKey),
            true // Auto-refresh de tokens
        );

        const db = firebase.firestore();
        const auth = firebase.auth();
    </script>

    <!-- App Logic -->
    <script type="module" src="js/app.js"></script>

    <!-- Register Service Worker for PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado:', reg.scope))
                    .catch(err => console.log('Error al registrar SW:', err));
            });
        }
    </script>
</body>

</html>
